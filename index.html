<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokédex</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>

<body>

<div class="pokedex">

  <div class="top-bar">
    <div class="light blue"></div>
    <div class="light green"></div>
    <div class="light yellow"></div>
    <!-- Button to toggle favorites view -->
    <button id="showFavsBtn" class="show-favs-btn" title="Show favorites">Favorites ★</button>
  </div>

  <div class="screen">

    <div class="search-box">
      <label>SEARCH POKéMON:</label>
      <input id="searchInput" placeholder="Name or ID">
      <button onclick="searchPokemon()">SEARCH</button>
    </div>

    <div class="display">
      <div class="sprite-box">
        <img id="sprite" src="">
      </div>

      <div class="info">
        <div id="name">NAME: ---</div>
        <div id="type">TYPE: ---</div>
        <div id="ability">ABILITY: ---</div>
        <!-- Favorite toggle -->
        <button id="favBtn" class="fav-btn" title="Save to favorites">☆</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>
    <div class="evolution" id="evolution"></div>

    <!-- Favorites view (hidden by default) -->
    <div id="favoritesView" class="favorites hidden"></div>

  </div>

  <div class="controls">
    <div class="dpad"></div>
    <div class="buttons">
      <div class="btn red"></div>
      <div class="btn bluebtn"></div>
    </div>
  </div>

</div>

<script src="index.js"></script>
</body>
</html>
