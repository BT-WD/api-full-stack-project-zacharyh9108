<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokédex (Static)</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>

<body>

<div class="pokedex">

  <!-- Top lights -->
  <div class="top-bar">
    <div class="light blue"></div>
    <div class="light green"></div>
    <div class="light yellow"></div>
  </div>

  <!-- Screen -->
  <div class="screen">

    <!-- Search (non-functional placeholder) -->
    <div class="search-box">
      <label>SEARCH POKéMON:</label>
      <input placeholder="Name or ID">
      <button>SEARCH</button>
    </div>

    <!-- Display -->
    <div class="display">

      <!-- Sprite placeholder -->
      <div class="sprite-box">
        <img src="https://via.placeholder.com/100" alt="Pokemon sprite">
      </div>

      <!-- Info placeholders -->
      <div class="info" id="data-container">
        <div>NAME: PIKACHU</div>
        <div>TYPE: ELECTRIC</div>
        <div>ABILITY: STATIC</div>
      </div>

    </div>

    <!-- Stats placeholder -->
    <div class="stats" id="stats-container">
      <strong>STATS</strong><br>
      HP: ███████<br>
      ATTACK: █████<br>
      DEFENSE: ████<br>
      SPEED: ████████
    </div>

    <!-- Evolution placeholder -->
    <div class="evolution" id="evolution-container">
      EVOLUTION: PICHU → PIKACHU → RAICHU
    </div>

  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="dpad"></div>
    <div class="buttons">
      <div class="btn red"></div>
      <div class="btn bluebtn"></div>
    </div>
  </div>

</div>

</body>
</html>
